name: hkeyetna
description: HKEYETNA travel app for curated Tunisia stays, experiences, and local bookings.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.2
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_fonts: ^6.3.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  collection: ^1.19.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/data/
    - assets/images/
    - assets/images/regions/
    - assets/images/places/
    - assets/images/banners/
    - assets/images/onboarding/
    - assets/images/mockups/
